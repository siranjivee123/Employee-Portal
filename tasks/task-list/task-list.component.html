<!-- Header -->
<div class="header">
</div>

<!-- Top actions -->
<div class="top-actions">
  <button class="add-btn" routerLink="/add-task">
    Add New Task
  </button>

  <div class="filters">

<!-- Search -->
    <input
      type="text"
      placeholder="Search by ticket"
      [(ngModel)]="searchText"
      (input)="applyFilter()"/>

<!-- Date -->
    <input
      type="date"
      [(ngModel)]="selectedDate"
      (change)="applyFilter()" />

<!-- Project -->
    <input
      type="text"
      placeholder="Search by project"
      [(ngModel)]="selectedProject"
      (input)="applyFilter()"/>
    

<!-- Sort -->
    <select [(ngModel)]="sortOption" (change)="applyFilter()">
      <option value="">Sort By Ticket / Project</option>
      <option value="ticket-asc">Ticket (Asc- Dsc)</option>
      <option value="ticket-desc">Ticket (Dsc - Asc)</option>
      <option value="project-asc">Project (A - Z)</option>
      <option value="project-desc">Project (Z - A)</option>
    </select>

  </div>
</div>

<!-- Table -->
<div class="table-card">
  <h3>Task List</h3>

  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">

<!-- Ticket -->
    <ng-container matColumnDef="ticket">
      <th mat-header-cell *matHeaderCellDef> Ticket </th>
      <td mat-cell *matCellDef="let t"> {{ t.ticket }} </td>
    </ng-container>

<!-- Description -->
    <ng-container matColumnDef="description">
      <th mat-header-cell *matHeaderCellDef> Description </th>
      <td mat-cell *matCellDef="let t"> {{ t.description }} </td>
    </ng-container>

<!-- Project -->
    <ng-container matColumnDef="project">
      <th mat-header-cell *matHeaderCellDef> Project </th>
      <td mat-cell *matCellDef="let t"> {{ t.project }} </td>
    </ng-container>

<!-- Shift -->
    <ng-container matColumnDef="shift">
      <th mat-header-cell *matHeaderCellDef> Shift </th>
      <td mat-cell *matCellDef="let t"> {{ t.shift }} </td>
    </ng-container>

<!-- Assigned By -->
    <ng-container matColumnDef="assignedBy">
      <th mat-header-cell *matHeaderCellDef> Assigned By </th>
      <td mat-cell *matCellDef="let t"> {{ t.assignedBy }} </td>
    </ng-container>

<!-- Effort -->
    <ng-container matColumnDef="effort">
      <th mat-header-cell *matHeaderCellDef> Effort (hrs) </th>
      <td mat-cell *matCellDef="let t"> {{ t.effort }} </td>
    </ng-container>

<!-- Date -->
    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> Date </th>
      <td mat-cell *matCellDef="let t">
        {{ t.date | date:'dd-MM-yyyy' }} 
      </td>
    </ng-container>

<!-- Actions -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let t">

        <button (click)="viewTask(t)">View</button>
        <button (click)="editTask(t)">Edit</button>
        <button (click)="deleteTask(t.id)">Delete</button>

      </td>
    </ng-container>

<!-- Rows -->
    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
<tr class="mat-row" *matNoDataRow>
  <td class="mat-cell" colspan="8" style="text-align:center; padding:20px;">
    No Tasks Found!
  </td>
</tr>
  </table>
</div>

<!-- Pagination -->
<mat-paginator
  [pageSize]="10"
  [pageSizeOptions]="[5, 10, 25, 50]"
  showFirstLastButtons>
</mat-paginator>
