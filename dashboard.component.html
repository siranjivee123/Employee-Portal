<div class="dashboard-container">

<!-- Side bar -->
<div class="sidebar" [class.open]="isSidebarOpen">

  <!-- ROLE DISPLAY -->
  <h2 class="logo">{{ role | uppercase }}</h2>

  <ul>

    <!--  MENU BASED ON ROLE -->
    <li
      *ngFor="let item of menuItems"
      (click)="setView(item.view)"
      [class.active]="activeView === item.view">

      <span class="material-icons">{{ item.icon }}</span>
      <span>{{ item.label }}</span>

    </li>

  </ul>
</div>

<!-- Overlay -->
<div class="overlay"
     *ngIf="isSidebarOpen"
     (click)="closeSidebar()">
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- HEADER -->
  <div class="header">

    <button class="menu-btn" (click)="toggleSidebar()">☰</button>

    <h2 *ngIf="activeView === 'dashboard'">Dashboard Overview</h2>
    <h2 *ngIf="activeView === 'employees'">Employee Management</h2>
    <h2 *ngIf="activeView === 'projects'">Project Management</h2>
    <h2 *ngIf="activeView === 'tasks'">Task Management</h2>
    <h2 *ngIf="activeView === 'leave'">Leave Management</h2>

    <button class="logout-btn" (click)="logout()">Logout</button>

  </div>

  <!-- DASHBOARD VIEW -->
  <div *ngIf="activeView === 'dashboard'">
    <div class="cards">

      <div class="card">
        <p><b>Total Employees</b></p>
        <h3>1,240</h3>
      </div>

      <div class="card">
        <p><b>Active Projects</b></p>
        <h3>45</h3>
      </div>

      <div class="card">
        <p><b>Pending Tasks</b></p>
        <h3>128</h3>
      </div>

      <div class="card">
        <p><b>Leave Requests</b></p>
        <h3>12</h3>
      </div>

      <div class="card">
        <p><b>Upcoming Projects</b></p>
        <h3>20</h3>
      </div>

      <div class="card">
        <p><b>Project Completed</b></p>
        <h3>60</h3>
      </div>

    </div>
  </div>

  <!-- EMPLOYEE VIEW -->
  <div *ngIf="activeView === 'employees'">
    <app-employee-list></app-employee-list>
  </div>

  <!-- PROJECTS VIEW -->
  <div *ngIf="activeView === 'projects'">
    <app-projects></app-projects>
  </div>

  <!-- TASKS VIEW -->
  <div *ngIf="activeView === 'tasks'">
    <app-task-list></app-task-list>
  </div>

</div>
</div>
