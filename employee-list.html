<!-- Header -->
<div class="header"></div>
<!-- Top actions-->
<div class="top-actions">
  <button class="add-btn" routerLink="/add-employee">
    Add New Employee
  </button>
  <div class="filters">
    <input
      type="text"
      placeholder="Search by email"
      [(ngModel)]="searchText"
      (input)="applyFilter()"
    />
    <input
      type="date"
      [(ngModel)]="selectedDate"
      (change)="applyFilter()"
    />
  
<input
  type="text"
  placeholder="Search by project name"
  [(ngModel)]="selectedProject"
  (input)="applyFilter()"
/>
 <!-- Sort Dropdown -->
<select [(ngModel)]="sortOption" (change)="applyFilter()">
    <option value="">Sort By Project / Name </option>
    <option value="name-asc">Name (A - Z)</option>
    <option value="name-desc">Name (Z - A)</option>
    <option value="project-asc">Project (A - Z)</option>
    <option value="project-desc">Project (Z - A)</option>
  </select>
  </div>
</div>

<!-- Table-->
<div class="table-card">

  <h3>Employees List</h3>

  <table mat-table [dataSource]="filteredEmployees" class="mat-elevation-z8">

<!-- ID -->  
   <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef> Employee ID </th>
      <td mat-cell *matCellDef="let emp"> {{ emp.id }} </td>
    </ng-container>

<!-- Name -->   
  <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef> Employee Name </th>
      <td mat-cell *matCellDef="let emp"> {{ emp.name }} </td>
    </ng-container>

<!-- projects --> 
    <ng-container matColumnDef="projects">
      <th mat-header-cell *matHeaderCellDef> Project </th>
      <td mat-cell *matCellDef="let emp">
        {{ emp.projects?.join(', ') }}
      </td>
    </ng-container>

<!-- Tasks -->    
 <ng-container matColumnDef="tasks">
      <th mat-header-cell *matHeaderCellDef> Tasks Assigned </th>
      <td mat-cell *matCellDef="let emp"> {{ emp.tasks }} </td>
    </ng-container>

<!-- Email -->   
  <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef> Email </th>
      <td mat-cell *matCellDef="let emp"> {{ emp.email }} </td>
    </ng-container>

<!-- Date -->    
 <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef> Date </th>
      <td mat-cell *matCellDef="let emp"> {{ emp.date | date:'medium' }} </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef> Actions </th>
      <td mat-cell *matCellDef="let emp"> 
    <button class="btn view" (click)="viewEmployee(emp)">
      View
    </button>

    <button class="btn edit" (click)="editEmployee(emp)">
      Edit
    </button>

    <button class="btn delete" (click)="deleteEmployee(emp.id)">
      Delete
    </button>
      </td>
    </ng-container>

<!-- Header and rows-->   
  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>
  </div>
<mat-paginator
  [pageSize]="10"
  [pageSizeOptions]="[5, 10, 25, 50]"
  showFirstLastButtons>
</mat-paginator>
